version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: collabboard-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - collabboard-net

  backend:
    build: ./backend
    container_name: collabboard-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/collabboard
      - JWT_SECRET=${JWT_SECRET:-change_this_secret_in_production}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5173
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - mongo
    networks:
      - collabboard-net

  frontend:
    build: ./frontend
    container_name: collabboard-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - collabboard-net

volumes:
  mongo_data:

networks:
  collabboard-net:
    driver: bridge
